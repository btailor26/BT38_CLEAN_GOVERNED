name: Full Sync Shutdown Proof

on:
  push:
    branches:
      - codex/full-sync-shutdown
  pull_request:
    branches:
      - main

jobs:
  shutdown-proof:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Compile shutdown branch files
        run: |
          python -m py_compile \
            app.py \
            routes.py \
            sync_dispatcher.py \
            queue_manager.py \
            sync_service.py \
            smart_push_service.py \
            auto_push_service.py \
            marketplace_order_processor.py \
            warehouse_push_coordinator.py \
            amazon_service.py \
            ebay_service.py \
            shutdown_http_guard.py \
            sitecustomize.py \
            services/runtime_gate.py

      - name: Run shutdown proof tests
        run: |
          pytest -v \
            tests/test_shutdown_http_guard.py \
            tests/test_old_sync_paths_shutdown.py
